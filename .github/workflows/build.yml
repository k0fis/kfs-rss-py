name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar czf kfs-rss-py-${VERSION}.tar.gz \
            rss_api.py rss_fetch.py rss_db.py rss_config.py rss_jwt.py rss_feed_parser.py \
            rss_llm_queue.py \
            requirements.txt migrations/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: kfs-rss-py-*.tar.gz
